# StellaForge MVP pipeline configuration.
# CLI overrides win: `snakemake --config key=value` beats any value here.

# Equilibrium / run identifier.
run_name: HSX_vacuum_ns201_quickrun

# Container runtime device. One of: cpu, gpu.
device: cpu

# Stage 3 SFINCS (sfincs_jax) radial scan.
# Defaults match the script's defaults (for the quickrun test).
stage3:
  sfincs_jax:
    neopax_config: stages/stage5-transport/input/Solve_Transport_equations_noHe_radau_HSX_quickrun.toml
    sfincs_template: null
    wout_path: null

    # --- Profile source ---
    profiles_source: analytical
    neopax_result: null
    analytical_n_radii: 51
    time_index: -1

    # --- Output ---
    output_subdir: HSX_vacuum_ns201_nx4_quickrun

    # --- Surface selection ---
    rho_indices: null
    rho_min: null
    rho_max: null
    num_radii: null

    # --- Phi1 tri-state ---
    include_phi1: null

    # --- Resolution ---
    ntheta: 5
    nzeta: 11
    nxi: 12
    nl: 3
    nx: 4
    solver_tolerance: 1.0e-6
    dense_fp_max: null

    # --- Parallelism ---
    max_parallel: 8
    cores_per_run: 1
    gpu_ids: "0"
    worker_sharding: "off"

    # --- Benchmark ---
    benchmark_repeats: 0
    benchmark_warmup: 1

    # --- Toggles ---
    plot: true
    verbose_workers: true
