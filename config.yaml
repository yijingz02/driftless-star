# StellaForge MVP pipeline configuration.
# CLI overrides win: `snakemake --config key=value` beats any value here.

# Equilibrium / run identifier.
run_name: HSX_vacuum_ns201_quickrun

# Container runtime device. One of: cpu, gpu.
device: cpu

# Stage 3 SFINCS (sfincs_jax) radial scan.
stage3:
  sfincs_jax:
    config: null

    # --- Profile source ---
    profiles_source: analytical
    neopax_result: null

    # --- Output ---
    output_subdir: HSX_vacuum_ns201_nx4_quickrun

    # --- Resolution ---
    ntheta: 5
    nzeta: 11
    nxi: 12
    nx: 4
    solver_tolerance: 1.0e-6

    # --- Parallelism ---
    max_parallel: 1
    # Used only when `device: gpu`.
    gpu_ids: "0"

    # --- Toggles ---
    plot: true
    verbose_workers: true

# Stage 4 SPECTRAX-GK radial scan.
stage4:
  spectrax_gk:
    config: null

    # --- Profile source ---
    profiles_source: analytical
    neopax_result: null

    # --- Output ---
    output_subdir: spectrax_HSX_quickrun

    # --- Resolution / time window ---
    nx: 12
    ny: 12
    ntheta: 30
    t_max: 10.0
    average_window: 1.0
    sample_stride: 50
    diagnostics_stride: 1

    # --- Parallelism ---
    max_parallel: 1
    # Used only when `device: gpu`.
    gpu_ids: "0"

    # --- Toggles ---
    plot: true
    plot_run_heat_traces: true
    verbose_workers: true
    collect_even_if_failures: true

# Stage 5 NEOPAX transport solver.
# The neopax CLI takes a single TOML; everything else lives in that file.
stage5:
  neopax:
    config: Solve_Transport_equations_noHe_radau_HSX_quickrun.toml
