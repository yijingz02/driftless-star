name: Build Docker Image
description: Build and optionally push a Docker image for a Pixi environment

inputs:
  environment:
    description: Pixi environment name (e.g., stage-1-vmec, stage-1-vmec-gpu)
    required: true
  image-tag:
    description: Docker image tag suffix (e.g., stage-1-vmec-cpu, stage-1-vmec-gpu)
    required: true
  cuda-version:
    description: CUDA version for GPU builds (leave empty for CPU builds)
    required: false
    default: ""
  platforms:
    description: Comma-separated target platforms (e.g. "linux/amd64,linux/arm64")
    required: false
    default: "linux/amd64"
  registry:
    description: Container registry
    required: false
    default: ghcr.io
  push:
    description: Whether to push the image to the registry
    required: true
  registry-username:
    description: Registry login username
    required: true
  registry-password:
    description: Registry login password (e.g., GITHUB_TOKEN)
    required: true

runs:
  using: composite
  steps:
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ inputs.registry }}/${{ github.repository }}
        tags: |
          type=raw,value=${{ inputs.image-tag }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=${{ inputs.image-tag }}-sha-

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to container registry
      if: inputs.push == 'true'
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: mvp
        file: mvp/Dockerfile
        platforms: ${{ inputs.platforms }}
        build-args: |
          CUDA_VERSION=${{ inputs.cuda-version }}
          ENVIRONMENT=${{ inputs.environment }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        pull: true
        push: ${{ inputs.push }}
