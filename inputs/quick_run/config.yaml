# driftless-star pipeline run configuration.
# CLI overrides `snakemake --config key=value` beat any value here.

# Independent of the input_dir/output_dir folder name; describes the physics case.
run_name: HSX_vacuum_ns201_quickrun

# Container runtime device. One of: cpu, gpu.
device: cpu


input_dir: inputs/quick_run
output_dir: outputs/quick_run

# Input basenames (under input_dir); output basenames (under output_dir/stageN_<name>/).
filenames:
  s1_input: vmec_input.{run_name}      # Stage 1 VMEC INDATA namelist
  s1_output: wout_{run_name}.nc
  s2_output: boozmn_{run_name}.nc
  s3_config: sfincs_input.{run_name}   # Stage 3 SFINCS namelist
  s3_output: sfincs_jax_flux_profiles.h5
  s4_config: "{run_name}.toml"         # Stage 4 SPECTRAX-GK template
  s4_output: neopax_fluxes.h5
  s5_config: common_input.toml         # shared by Stages 3, 4, 5
  s5_output: transport_solution.h5
  s5_signal: converge_status.json

# Stage 3 SFINCS (sfincs_jax) radial scan.
stage3:
  sfincs_jax:
    # --- Profile source ---
    profiles_source: analytical
    neopax_result: null

    # --- Resolution ---
    ntheta: 5
    nzeta: 11
    nxi: 12
    nx: 4
    solver_tolerance: 1.0e-6

    # --- Parallelism ---
    max_parallel: 1
    # Used only when `device: gpu`.
    gpu_ids: "0"

    # --- Toggles ---
    plot: true
    verbose_workers: true

# Stage 4 SPECTRAX-GK radial scan.
stage4:
  spectrax_gk:
    # --- Profile source ---
    profiles_source: analytical
    neopax_result: null

    # --- Resolution / time window ---
    nx: 12
    ny: 12
    ntheta: 30
    t_max: 10.0
    average_window: 1.0
    sample_stride: 50
    diagnostics_stride: 1

    # --- Parallelism ---
    max_parallel: 1
    # Used only when `device: gpu`.
    gpu_ids: "0"

    # --- Toggles ---
    plot: true
    plot_run_heat_traces: true
    verbose_workers: true
    collect_even_if_failures: true
