[workspace]
channels = ["conda-forge"]
name = "mvp"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
version = "0.1.0"

[tasks.start]
depends-on = [ "stage-1-vmec", "stage-2-booz", "stage-3-sfincs"]

[tasks.initialize-example-inputs]
cmd = """mkdir -p stage1-equilibrium/input && (test -n "$(ls stage1-equilibrium/input)" && echo "stage1-equilibrium/input/ already populated; skipping (wipe the directory to re-seed from expected_input/)." || cp -R stage1-equilibrium/expected_input/* stage1-equilibrium/input/) && \
mkdir -p stage3-neoclassical/input && (test -n "$(ls stage3-neoclassical/input)" && echo "stage3-neoclassical/input/ already populated; skipping (wipe the directory to re-seed from expected_input/)." || cp -R stage3-neoclassical/expected_input/* stage3-neoclassical/input/) && \
mkdir -p stage4-turbulence/input && (test -n "$(ls stage4-turbulence/input)" && echo "stage4-turbulence/input/ already populated; skipping (wipe the directory to re-seed from expected_input/)." || cp -R stage4-turbulence/expected_input/* stage4-turbulence/input/)"""

[dependencies]

[feature.vmec-jax.dependencies]
numpy = ">=2.4.3,<3"
jax = ">=0.9.1,<0.10"
netcdf4 = ">=1.7.4,<2"

[feature.vmec-jax.pypi-dependencies]
vmec-jax = { git = "https://github.com/uwplasma/vmec_jax", rev = "fbe829c33f3bfcac5e2adc49b343cf43db280196" }

[feature.vmec-jax.tasks.stage-1-vmec]
cmd = "vmec_jax stage1-equilibrium/input/input.HSX_QHS_vacuum_ns201 --outdir stage1-equilibrium/output"

[feature.desc.dependencies]
desc-opt = ">=0.17.1,<0.18"

[feature.booz-xform.dependencies]
booz_xform = ">=0.0.9,<0.0.10"

[feature.booz-xform.tasks.stage-2-booz]
cmd = 'python -c "import booz_xform; print(booz_xform.__version__)"'

[feature.booz-xform-jax.dependencies]
numpy = ">=2.4.3,<3"
scipy = ">=1.17.1,<2"
jax = ">=0.9.1,<0.10"
netcdf4 = ">=1.7.4,<2"
matplotlib = ">=3.10.8,<4"
plotly = ">=6.6.0,<7"

[feature.booz-xform-jax.pypi-dependencies]
booz-xform-jax = { git = "https://github.com/uwplasma/booz_xform_jax.git", rev = "1f206597f2f28436e0e2124160c13de9ae63b2ea" }

[feature.booz-xform-jax.tasks.stage-2-booz]
cmd = "python stage2-boozer/run_boozer.py --wout stage1-equilibrium/output/wout_HSX_QHS_vacuum_ns201.nc --output stage2-boozer/output/boozmn_HSX_QHS_vacuum_ns201.nc"

[feature.sfincs.dependencies]
sfincs-mpich = ">=3.0.0,<4"

[feature.sfincs.tasks.stage-3-sfincs-fortran]
cmd = """mkdir -p stage3-neoclassical/output && \
cp stage3-neoclassical/input/input.HSX_QHS_vacuum_ns201 stage3-neoclassical/output/input.namelist && \
cd stage3-neoclassical/output && \
sfincs"""

[feature.sfincs-jax.dependencies]
numpy = ">=2.4.3,<3"
scipy = ">=1.17.1,<2"
jax = ">=0.9.1,<0.10"
h5py = ">=3.16.0,<4"

[feature.sfincs-jax.pypi-dependencies]
sfincs-jax = { git = "https://github.com/uwplasma/sfincs_jax", rev = "eb9aee4b7606b7bf8ce721b316332e478f713f68" }

[feature.sfincs-jax.tasks.stage-3-sfincs]
cmd = "sfincs_jax stage3-neoclassical/input/input.HSX_QHS_vacuum_ns201 --out stage3-neoclassical/output/sfincsOutput.h5 --wout-path stage1-equilibrium/output/wout_HSX_QHS_vacuum_ns201.nc"

[feature.spectrax-gk.dependencies]
numpy = ">=2.4.3,<3"
jax = ">=0.9.2,<0.10"
diffrax = ">=0.7.2,<0.8"
equinox = ">=0.13.6,<0.14"
tqdm = ">=4.67.3,<5"
matplotlib = ">=3.10.8,<4"
# booz-xform-jax dependencies
netcdf4 = ">=1.7.4,<2"
plotly = ">=6.6.0,<7"

[feature.spectrax-gk.pypi-dependencies]
spectrax-gk = { git = "https://github.com/uwplasma/SPECTRAX-GK.git", rev = "cbd1f5b647347bb91e1e943e69bcd166a43000c0" }
booz-xform-jax = { git = "https://github.com/uwplasma/booz_xform_jax.git", rev = "1f206597f2f28436e0e2124160c13de9ae63b2ea" }

[feature.spectrax-gk.tasks.stage-4-spectrax]
cmd = "spectrax-gk run --config ./stage4-turbulence/input/runtime_hsx_nonlinear_vmec_geometry.toml --out stage4-turbulence/output/hsx_run"

[feature.neopax.dependencies]
scipy = ">=1.17.1,<2"
jax = ">=0.9.1,<0.10"
equinox = ">=0.13.6,<0.14"
optimistix = ">=0.1.0,<0.2"
lineax = ">=0.1.0,<0.2"
diffrax = ">=0.7.2,<0.8"
interpax = ">=0.3.13,<0.4"
matplotlib = ">=3.10.8,<4"
h5py = ">=3.16.0,<4"
netcdf4 = ">=1.7.4,<2"

[feature.neopax.pypi-dependencies]
orthax = ">=0.2.8, <0.3"
inductiva = ">=0.18.12, <0.19"
neopax = { git = "https://github.com/uwplasma/NEOPAX.git", rev = "5ec4cc3c5583121c5c454358defa7ab1af40c211" }

[feature.pipeline]
channels = ["conda-forge", "bioconda"]

[feature.pipeline.dependencies]
snakemake-minimal = ">=8,<10"
graphviz = ">=9,<15"
pytest = ">=8,<9"

[feature.cuda]
platforms = ["linux-64"]
[feature.cuda.system-requirements]
cuda = "12"

[environments]
stage-1-vmec = {features = ["vmec-jax"], no-default-feature = true }
stage-1-vmec-gpu = {features = ["vmec-jax", "cuda"], no-default-feature = true }
stage-1-desc = {features = ["desc"], no-default-feature = true }
stage-1-desc-gpu = {features = ["desc", "cuda"], no-default-feature = true }
stage-2-booz = {features = ["booz-xform"], no-default-feature = true }
stage-2-booz-jax = {features = ["booz-xform-jax"], no-default-feature = true }
stage-2-booz-jax-gpu = {features = ["booz-xform-jax", "cuda"], no-default-feature = true }
stage-3-sfincs-fortran = {features = ["sfincs"], no-default-feature = true}
stage-3-sfincs = {features = ["sfincs-jax"], no-default-feature = true}
stage-3-sfincs-gpu = {features = ["sfincs-jax", "cuda"], no-default-feature = true }
stage-4-spectrax = {features = ["spectrax-gk"], no-default-feature = true}
stage-4-spectrax-gpu = {features = ["spectrax-gk", "cuda"], no-default-feature = true }
stage-5-neopax = {features = ["neopax"], no-default-feature = true}
stage-5-neopax-gpu = {features = ["neopax", "cuda"], no-default-feature = true }
pipeline = {features = ["pipeline"], no-default-feature = true}
